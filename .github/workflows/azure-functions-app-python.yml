name: Deploy Python project to Azure Function App

on:
  push:
    branches: ["dev"]

env:
  AZURE_FUNCTIONAPP_NAME: 'azfunitsm05699'
  # Ajustado para o caminho onde estão host.json e requirements.txt
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/functions' 
  PYTHON_VERSION: '3.12'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }} Environment
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    # O Azure Functions para Python no Linux prefere que o build 
    # ocorra no lado do servidor (Remote Build) para evitar conflitos de arquitetura.
    - name: 'Run Azure Functions Action'
      uses: Azure/functions-action@v1
      id: fa
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        scm-do-build-during-deployment: true
        enable-oryx-build: true
